version: "3.9"

services:
  db:
    build:
      context: ./infra/db
      dockerfile: Dockerfile
    container_name: hono-railway-postgres
    environment:
      POSTGRES_USER: railway
      POSTGRES_PASSWORD: railway
      POSTGRES_DB: hono_railway
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U railway -d hono_railway"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db-data:
